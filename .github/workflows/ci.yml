name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Bundle with esbuild
        run: node build.mjs

      - name: Smoke test (start + health check)
        run: |
          cp .env dist/bundle.env
          timeout 10 node dist/bundle.cjs &
          sleep 3
          curl -sf http://localhost:3544/health || exit 1
          kill %1 2>/dev/null || true
